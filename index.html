<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGU+ 홈 결합 견적서</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f4f4f7; padding-bottom: 80px; }
        .text-uplus { color: #E6007E; }
        .bg-uplus { background-color: #E6007E; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        select { appearance: none; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.2em 1.2em; padding-right: 1.8rem; }
        .mobile-container { max-width: 430px; margin: 0 auto; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-2">

    <!-- ✅ 캡쳐 버튼 -->
    <button id="captureBtn" onclick="captureAndSave(this)" class="no-print fixed bottom-8 right-4 z-[9999] bg-[#E6007E] text-white px-5 py-3 rounded-full flex items-center gap-2 text-sm font-bold shadow-2xl active:scale-95 transition-transform border border-pink-400">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M15 12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h1.172a3 3 0 0 0 2.12-.879l.83-.828A1 1 0 0 1 6.827 3h2.344a1 1 0 0 1 .707.293l.828.828A3 3 0 0 0 12.828 5H14a1 1 0 0 1 1 1v6zM2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4H2z"/><path d="M8 11a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5zm0 1a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7zM3 6.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0z"/></svg>
        <span>캡쳐</span>
    </button>

    <div id="capture-area" class="mobile-container overflow-hidden border border-slate-200">
        <div class="bg-uplus p-3 text-white flex justify-between items-center">
            <div>
                <h1 class="text-base font-black tracking-tight uppercase leading-tight">LG Uplus</h1>
                <p class="text-[8px] opacity-90 uppercase tracking-widest leading-none mt-0.5">U+ Bundle Estimate</p>
            </div>
            <div class="text-right">
                <div class="bg-black/15 px-2 py-0.5 rounded-md text-[10px] font-bold" id="displayDate">2026.04.01</div>
            </div>
        </div>

        <div class="p-3">
            <!-- 옵션 설정 -->
            <div class="mb-3 p-3 bg-slate-50 rounded-lg border border-slate-100 no-print flex flex-col gap-2">
                <div class="border-b border-slate-200 pb-1 mb-0.5 flex justify-between items-center">
                    <h2 class="text-[12px] font-bold text-slate-800 tracking-tight">서비스 옵션 설정</h2>
                    <select id="serviceCategory" class="bg-uplus text-white text-[10px] font-bold px-2 py-0.5 rounded outline-none border-none">
                        <option value="home">가정용 인터넷</option>
                        <option value="business">우리가게패키지</option>
                    </select>
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[9px] font-bold text-slate-400 mb-0.5 uppercase">인터넷 상품</label>
                        <select id="internet" class="w-full bg-white border border-slate-200 rounded px-1.5 py-1 text-[11px] font-bold text-uplus outline-none">
                        </select>
                    </div>
                    <div>
                        <label class="block text-[9px] font-bold text-slate-400 mb-0.5 uppercase">사은품 단말</label>
                        <select id="giftDevice" class="w-full bg-white border border-slate-200 rounded px-1.5 py-1 text-[11px] font-bold outline-none">
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-[9px] font-bold text-slate-400 mb-0.5 uppercase">메인 TV 요금제</label>
                    <select id="tvPlan" class="w-full bg-white border border-slate-200 rounded px-1.5 py-1 text-[11px] font-bold outline-none">
                    </select>
                </div>

                <div>
                    <label class="block text-[9px] font-bold text-slate-400 mb-0.5 uppercase">부셋탑(추가 TV) 요금제 <span class="text-uplus">(50% 할인)</span></label>
                    <select id="subTvPlan" class="w-full bg-white border border-slate-200 rounded px-1.5 py-1 text-[11px] font-bold outline-none border-uplus ring-1 ring-uplus/20">
                        <option value="none">부셋탑 미선택</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[9px] font-bold text-slate-400 mb-0.5 uppercase">U+ 스마트홈</label>
                        <select id="smartHome" class="w-full bg-white border border-slate-200 rounded px-1.5 py-1 text-[11px] font-bold outline-none">
                            <option value="none">미선택</option>
                            <option value="family">우리집지킴이 Family (11,000원)</option>
                            <option value="kids">우리집돌봄이 Kids (12,100원)</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1 justify-center">
                        <label class="flex items-center gap-1.5 text-[9px] font-bold text-slate-600"><input type="checkbox" id="addCctv" class="w-3.5 h-3.5 accent-uplus"> 지능형 CCTV</label>
                        <label class="flex items-center gap-1.5 text-[9px] font-bold text-slate-600"><input type="checkbox" id="addPhone" class="w-3.5 h-3.5 accent-uplus"> AI 전화</label>
                    </div>
                </div>

                <div class="flex items-center justify-between border-t border-slate-200 pt-1">
                    <label class="flex items-center gap-1.5 text-[10px] font-bold text-uplus cursor-pointer">
                        <input type="checkbox" id="goodStart" checked class="w-3.5 h-3.5 accent-uplus"> Good Start (+5만)
                    </label>
                    <input type="date" id="docDate" class="bg-white border border-slate-200 rounded px-1.5 py-1 text-[10px] w-[120px]" value="2026-04-01">
                </div>
            </div>

            <div class="mb-1.5 px-1 flex justify-between items-end">
                <h3 class="text-[13px] font-bold text-slate-800">■ 월 청구 예상 요금</h3>
                <span class="text-[8px] text-slate-400">결합 할인 자동 계산 / VAT 별도</span>
            </div>
            <div class="border-y border-slate-300 mb-3 w-full overflow-hidden text-slate-700">
                <table class="w-full text-left border-collapse text-[10px]">
                    <thead class="bg-slate-50 border-b border-slate-300 font-bold text-slate-600 uppercase">
                        <tr><th class="px-2 py-1.5 border-r border-slate-200">상품명</th><th class="px-1 py-1.5 text-center border-r border-slate-200">수량</th><th class="px-2 py-1.5 text-right">금액</th></tr>
                    </thead>
                    <tbody id="priceTable" class="divide-y divide-slate-200"></tbody>
                </table>
            </div>

            <!-- 사은품 및 합계 -->
            <div class="flex flex-col gap-3">
                <div>
                    <h3 class="text-[13px] font-bold text-slate-900 mb-1 px-1">■ 사은품 및 특별 지원금</h3>
                    <div class="p-3 bg-slate-50 rounded-lg border border-slate-200 text-[10px]">
                        <div id="voucherList" class="flex flex-col gap-1 mb-2 border-b border-slate-200 pb-2"></div>
                        <div class="flex flex-col">
                            <span class="text-[9px] font-bold text-slate-800 uppercase tracking-tighter">LG U+ 특별 지원금 (현금성 상품권)</span>
                            <div class="flex items-baseline justify-between">
                                <div class="flex items-baseline gap-0.5 text-red-600"><span id="voucherTotal" class="text-2xl font-black tracking-tight">0</span><span class="text-xs font-bold">원</span></div>
                                <span class="text-[8px] text-slate-500 font-medium">신세계/홈플러스 지급</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-800 p-4 rounded-xl text-white shadow-xl relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 w-16 h-16 bg-uplus/20 rounded-full"></div>
                    <div class="flex justify-between items-center text-[11px] mb-1">
                        <span class="text-slate-400">월 이용료 (공급가액)</span>
                        <span id="subtotal" class="font-bold">0</span>
                    </div>
                    <div class="flex justify-between items-center text-[11px] border-b border-white/10 pb-2 mb-2">
                        <span class="text-slate-400">부가가치세 (10%)</span>
                        <span id="vatTotal" class="font-bold">0</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <span class="text-[13px] font-black text-pink-200 uppercase">Total Monthly</span>
                        <div class="text-right leading-none"><span id="total" class="text-3xl font-black text-white tracking-tighter">0</span><span class="text-[12px] font-bold text-pink-400 ml-0.5 uppercase">won</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-slate-100 p-4 text-center text-[8px] text-slate-400 border-t border-slate-200">
            <p>© LG Uplus Corp. All rights reserved.</p>
        </div>
    </div>

    <div class="max-w-[430px] mx-auto mt-6 px-2 no-print pb-10">
        <button onclick="captureAndSave(this)" class="w-full bg-slate-800 text-white px-5 py-4 rounded-xl flex justify-center items-center gap-2 text-sm font-bold shadow-lg active:scale-95 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
            이미지로 저장 (고화질)
        </button>
    </div>

    <script>
        const toExVAT = (price) => Math.round(price / 1.1);

        const uplusData = {
            home: {
                "2.5G": { name: "안심 보상 2.5G", single: toExVAT(50600), combined: toExVAT(45100), voucher: { wifi: 450000, speaker: 430000 } },
                "1G": { name: "안심 보상 1G", single: toExVAT(45100), combined: toExVAT(39600), voucher: { wifi: 450000, speaker: 430000 } },
                "500M": { name: "안심 보상 500M", single: toExVAT(39600), combined: toExVAT(34100), voucher: { wifi: 400000, speaker: 380000 } },
                "100M": { name: "안심 보상 100M", single: toExVAT(27500), combined: toExVAT(27500), voucher: { ansim_bo: 300000, ansim: 280000 } }
            },
            business: {
                "기가안심(1G)": { name: "기가안심 1G", single: toExVAT(38500), combined_ai: toExVAT(35200), combined_tv_cctv: toExVAT(33000), voucher: 450000 },
                "기가슬림안심(500M)": { name: "기가슬림안심 500M", single: toExVAT(33000), combined_ai: toExVAT(29700), combined_tv_cctv: toExVAT(27500), voucher: 400000 },
                "광랜안심(100M)": { name: "광랜안심 100M", single: toExVAT(22000), combined_ai: toExVAT(22000), combined_tv_cctv: toExVAT(22000), voucher: 150000 },
                "기가안심보상(1G)": { name: "기가안심보상 1G", single: toExVAT(42900), combined_ai: toExVAT(39600), combined_tv_cctv: toExVAT(37400), voucher: 450000 },
                "기가슬림안심보상(500M)": { name: "기가슬림안심보상 500M", single: toExVAT(36300), combined_ai: toExVAT(33000), combined_tv_cctv: toExVAT(30800), voucher: 400000 },
                "광랜안심보상(100M)": { name: "광랜안심보상 100M", single: toExVAT(25300), combined_ai: toExVAT(25300), combined_tv_cctv: toExVAT(25300), voucher: 150000 }
            },
            tv: {
                "실속형": { main: toExVAT(13200), discount: 7700 },
                "기본형": { main: toExVAT(14300), discount: 7700 },
                "프리미엄": { main: toExVAT(18700), discount: 7700 },
                "프리미엄 VOD": { main: toExVAT(24200), discount: 11000 },
                "프리미엄 내맘대로": { main: toExVAT(29700), discount: 7700 },
                "프리미엄 유플레이": { main: toExVAT(24200), discount: 7700 },
                "넷플릭스 HD": { main: toExVAT(27800), discount: 9900 },
                "넷플릭스 UHD": { main: toExVAT(35700), discount: 9900 }
            },
            smarthome: {
                "family": { price: toExVAT(11000), discount: 2200 },
                "kids": { price: toExVAT(12100), discount: 2200 }
            },
            extra: { cctv: toExVAT(11000), ai_phone: toExVAT(3300) }
        };

        function updateGiftOptions() {
            const cat = document.getElementById('serviceCategory').value;
            const speed = document.getElementById('internet').value;
            const giftSelect = document.getElementById('giftDevice');
            giftSelect.innerHTML = '';
            if (cat === 'home') {
                giftSelect.style.display = 'block';
                if (speed === '100M') {
                    giftSelect.innerHTML = '<option value="ansim_bo">안심보상 선택</option><option value="ansim">안심 선택</option>';
                } else {
                    giftSelect.innerHTML = '<option value="wifi">기가 Wi-Fi 6</option><option value="speaker">스마트홈스피커</option>';
                }
            } else {
                giftSelect.style.display = 'none';
            }
        }

        function initSelects() {
            const tvSelect = document.getElementById('tvPlan');
            const subTvSelect = document.getElementById('subTvPlan');
            tvSelect.innerHTML = '<option value="none">TV 미선택 (단독 요금 적용)</option>';
            subTvSelect.innerHTML = '<option value="none">부셋탑 미선택</option>';

            Object.keys(uplusData.tv).forEach(key => {
                const mainFullPrice = Math.round(uplusData.tv[key].main * 1.1);
                const subFullPrice = Math.round(mainFullPrice * 0.5);
                
                const optMain = document.createElement('option');
                optMain.value = key;
                optMain.innerText = `${key} (${mainFullPrice.toLocaleString()}원)`;
                if (key === '프리미엄') optMain.selected = true;
                tvSelect.appendChild(optMain);

                const optSub = document.createElement('option');
                optSub.value = key;
                optSub.innerText = `${key} (부: ${subFullPrice.toLocaleString()}원)`;
                subTvSelect.appendChild(optSub);
            });
            updateInternetList();
        }

        function updateInternetList() {
            const cat = document.getElementById('serviceCategory').value;
            const intSelect = document.getElementById('internet');
            intSelect.innerHTML = '';
            Object.keys(uplusData[cat]).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.innerText = uplusData[cat][key].name;
                if (key === '500M' || key === '기가슬림안심보상(500M)') opt.selected = true;
                intSelect.appendChild(opt);
            });
            updateGiftOptions();
        }

        function update() {
            const cat = document.getElementById('serviceCategory').value;
            const intKey = document.getElementById('internet').value;
            const tvKey = document.getElementById('tvPlan').value;
            const subTvKey = document.getElementById('subTvPlan').value;
            const smartHomeKey = document.getElementById('smartHome').value;
            const hasCctv = document.getElementById('addCctv').checked;
            const hasPhone = document.getElementById('addPhone').checked;
            const giftKey = document.getElementById('giftDevice').value;
            const hasGoodStart = document.getElementById('goodStart').checked;
            
            document.getElementById('displayDate').innerText = document.getElementById('docDate').value.replace(/-/g, '.');

            const tbody = document.getElementById('priceTable');
            tbody.innerHTML = '';
            let subtotal = 0;
            let totalDiscount = 0;

            const internetInfo = uplusData[cat][intKey];
            if (!internetInfo) return;

            const isTvSelected = tvKey !== 'none';
            let intPrice = internetInfo.single;
            let intDesc = "인터넷 단독 요금";

            if (isTvSelected || subTvKey !== 'none' || hasCctv) {
                intPrice = internetInfo.combined || internetInfo.combined_tv_cctv || internetInfo.single;
                intDesc = "결합 할인 자동 적용";
            }
            subtotal += intPrice;
            tbody.innerHTML += `<tr><td class="px-2 py-2 border-r border-slate-200 font-bold">${internetInfo.name}<br><span class="text-[8px] font-normal text-slate-500">${intDesc}</span></td><td class="text-center border-r border-slate-200">1</td><td class="text-right px-2 font-bold">${intPrice.toLocaleString()}</td></tr>`;

            if (isTvSelected) {
                const tvUnit = uplusData.tv[tvKey];
                subtotal += tvUnit.main;
                tbody.innerHTML += `<tr><td class="px-2 py-2 border-r border-slate-200 font-bold">U+tv ${tvKey} (메인)</td><td class="text-center border-r border-slate-200">1</td><td class="text-right px-2 font-bold">${tvUnit.main.toLocaleString()}</td></tr>`;
                totalDiscount += toExVAT(tvUnit.discount);
            }

            if (subTvKey !== 'none') {
                const subTvUnit = uplusData.tv[subTvKey];
                const subPriceExVAT = Math.round(subTvUnit.main * 0.5);
                subtotal += subPriceExVAT;
                tbody.innerHTML += `<tr><td class="px-2 py-2 border-r border-slate-200 font-bold">U+tv ${subTvKey} (부)</td><td class="text-center border-r border-slate-200">1</td><td class="text-right px-2 font-bold">${subPriceExVAT.toLocaleString()}</td></tr>`;
            }

            if (smartHomeKey !== 'none') {
                const shData = uplusData.smarthome[smartHomeKey];
                subtotal += shData.price;
                tbody.innerHTML += `<tr><td class="px-2 py-2 border-r border-slate-200 font-bold">U+ 스마트홈</td><td class="text-center border-r border-slate-200">1</td><td class="text-right px-2 font-bold">${shData.price.toLocaleString()}</td></tr>`;
                if (isTvSelected) totalDiscount += toExVAT(shData.discount);
            }

            if (hasCctv) { subtotal += uplusData.extra.cctv; tbody.innerHTML += `<tr><td class="px-2 py-2 border-r border-slate-200 font-bold">지능형 CCTV</td><td class="text-center border-r border-slate-200">1</td><td class="text-right px-2 font-bold">${uplusData.extra.cctv.toLocaleString()}</td></tr>`; }
            if (hasPhone) { subtotal += uplusData.extra.ai_phone; tbody.innerHTML += `<tr><td class="px-2 py-2 border-r border-slate-200 font-bold">AI 전화</td><td class="text-center border-r border-slate-200">1</td><td class="text-right px-2 font-bold">${uplusData.extra.ai_phone.toLocaleString()}</td></tr>`; }

            if (totalDiscount > 0) {
                tbody.innerHTML += `<tr><td class="px-2 py-2 border-r border-slate-200 font-bold text-blue-600">결합 프로모션 할인</td><td class="text-center border-r border-slate-200">-</td><td class="text-right px-2 font-bold text-blue-600">-${totalDiscount.toLocaleString()}</td></tr>`;
            }

            const finalSubtotal = subtotal - totalDiscount;
            const vat = Math.floor(finalSubtotal * 0.1);
            document.getElementById('subtotal').innerText = finalSubtotal.toLocaleString() + ' 원';
            document.getElementById('vatTotal').innerText = vat.toLocaleString() + ' 원';
            document.getElementById('total').innerText = (finalSubtotal + vat).toLocaleString();

            const vList = document.getElementById('voucherList');
            vList.innerHTML = '';
            let vTotal = 0;
            const isCombined = isTvSelected || subTvKey !== 'none' || hasCctv || hasPhone;

            if (isCombined) {
                let baseV = (cat === 'home') ? (internetInfo.voucher[giftKey] || 0) : internetInfo.voucher;
                vTotal += baseV;
                vList.innerHTML += `<div class="flex justify-between"><span>결합 기본 혜택</span><span class="font-bold">${baseV.toLocaleString()} 원</span></div>`;
                if (subTvKey !== 'none') { 
                    vTotal += 30000; 
                    vList.innerHTML += `<div class="flex justify-between"><span>부셋탑 추가 혜택</span><span class="font-bold">30,000 원</span></div>`; 
                }
            } else {
                vTotal += 150000;
                vList.innerHTML += `<div class="flex justify-between"><span>인터넷 단독 혜택</span><span class="font-bold">150,000 원</span></div>`;
            }

            if (hasGoodStart && !intKey.includes('100M')) {
                vTotal += 50000;
                vList.innerHTML += `<div class="flex justify-between text-uplus font-bold"><span>Good Start 프로모션</span><span>+ 50,000 원</span></div>`;
            }
            document.getElementById('voucherTotal').innerText = vTotal.toLocaleString();
        }

        async function captureAndSave(btn) {
            const area = document.getElementById('capture-area');
            const originalHTML = btn.innerHTML;
            const dateInput = document.getElementById('docDate');
            const dateSpan = document.createElement('span');
            dateSpan.innerText = dateInput.value.replace(/-/g, '.');
            dateSpan.className = "text-[10px] font-bold text-white bg-transparent";
            dateInput.style.display = 'none';
            dateInput.parentNode.insertBefore(dateSpan, dateInput);
            
            try {
                btn.innerHTML = '처리 중...';
                const canvas = await html2canvas(area, { scale: 4, useCORS: true, backgroundColor: '#ffffff' });
                const link = document.createElement('a');
                link.download = `LGU_Estimate_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            } finally { 
                btn.innerHTML = originalHTML; 
                dateInput.style.display = '';
                dateSpan.remove();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initSelects();
            document.getElementById('serviceCategory').addEventListener('change', () => { updateInternetList(); update(); });
            document.getElementById('internet').addEventListener('change', () => { updateGiftOptions(); update(); });
            document.querySelectorAll('select, input').forEach(el => el.addEventListener('change', update));
            update();
        });
    </script>
</body>
</html>
